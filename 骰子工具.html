<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>骰子</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f2f2f7;
      --card: rgba(255, 255, 255, 0.72);
      --card-solid: #ffffff;
      --text-primary: #1c1c1e;
      --text-secondary: #6e6e73;
      --accent: #007aff;
      --accent-light: #e8f0fe;
      --border: rgba(60, 60, 67, 0.12);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      --shadow-deep: 0 20px 60px rgba(0, 0, 0, 0.12), 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      overflow-x: hidden;
    }

    /* 顶部标题区域 */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .header p {
      font-size: 15px;
      color: var(--text-secondary);
      margin-top: 6px;
      font-weight: 400;
    }

    /* 骰子容器 */
    .dice-area {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
      min-height: 180px;
      align-items: center;
    }

    /* 单个骰子 */
    .dice-wrapper {
      perspective: 600px;
    }

    .dice {
      width: 80px;
      height: 80px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s;
      cursor: default;
    }

    .dice.rolling {
      animation: roll3d 0.8s ease-out forwards;
    }

    @keyframes roll3d {
      0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      15%  { transform: rotateX(180deg) rotateY(90deg) rotateZ(45deg); }
      30%  { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
      50%  { transform: rotateX(540deg) rotateY(270deg) rotateZ(180deg); }
      70%  { transform: rotateX(680deg) rotateY(340deg) rotateZ(240deg); }
      85%  { transform: rotateX(710deg) rotateY(360deg) rotateZ(260deg); }
      100% { transform: rotateX(720deg) rotateY(360deg) rotateZ(270deg); }
    }

    /* 骰子面 */
    .dice-face {
      width: 80px;
      height: 80px;
      background: var(--card-solid);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      position: absolute;
      backface-visibility: hidden;
      border: 1px solid var(--border);
      transition: box-shadow 0.3s;
    }

    /* 六个面的变换 */
    .face-front  { transform: translateZ(40px); }
    .face-back   { transform: rotateY(180deg) translateZ(40px); }
    .face-right  { transform: rotateY(90deg) translateZ(40px); }
    .face-left   { transform: rotateY(-90deg) translateZ(40px); }
    .face-top    { transform: rotateX(90deg) translateZ(40px); }
    .face-bottom { transform: rotateX(-90deg) translateZ(40px); }

    /* 点阵布局 */
    .dots {
      display: grid;
      width: 56px;
      height: 56px;
      padding: 4px;
      gap: 6px;
    }

    .dot {
      width: 11px;
      height: 11px;
      background: var(--text-primary);
      border-radius: 50%;
      justify-self: center;
      align-self: center;
    }

    /* 1点 */
    .dots-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .dots-1 .dot { grid-column: 1; grid-row: 1; }

    /* 2点 */
    .dots-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .dots-2 .dot:nth-child(1) { grid-column: 2; grid-row: 1; }
    .dots-2 .dot:nth-child(2) { grid-column: 1; grid-row: 2; }

    /* 3点 */
    .dots-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .dots-3 .dot:nth-child(1) { grid-column: 2; grid-row: 1; }
    .dots-3 .dot:nth-child(2) { grid-column: 1; grid-row: 2; align-self: center; justify-self: center; grid-column: 1 / span 2; }
    .dots-3 .dot:nth-child(3) { grid-column: 1; grid-row: 3; }

    /* 4点 */
    .dots-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    /* 5点 */
    .dots-5 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .dots-5 .dot:nth-child(1) { grid-column: 1; grid-row: 1; }
    .dots-5 .dot:nth-child(2) { grid-column: 3; grid-row: 1; }
    .dots-5 .dot:nth-child(3) { grid-column: 2; grid-row: 2; }
    .dots-5 .dot:nth-child(4) { grid-column: 1; grid-row: 3; }
    .dots-5 .dot:nth-child(5) { grid-column: 3; grid-row: 3; }

    /* 6点 */
    .dots-6 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }

    /* 结果卡片 */
    .result-card {
      background: var(--card);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 28px;
      margin-bottom: 32px;
      text-align: center;
      min-width: 220px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .result-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .result-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .result-total {
      font-size: 48px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -2px;
      line-height: 1;
    }

    .result-detail {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    /* 控制区域 */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }

    /* 骰子数量选择器 */
    .count-selector {
      background: var(--card);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      display: flex;
      gap: 2px;
      box-shadow: var(--shadow);
    }

    .count-btn {
      width: 44px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.1s;
      font-family: inherit;
    }

    .count-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.35);
    }

    .count-btn:active {
      transform: scale(0.94);
    }

    /* 掷骰子按钮 */
    .roll-btn {
      width: 100%;
      height: 56px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 122, 255, 0.4);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      letter-spacing: -0.2px;
      position: relative;
      overflow: hidden;
    }

    .roll-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
    }

    .roll-btn:disabled {
      background: #aeaeb2;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .roll-btn .btn-text {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .roll-icon {
      font-size: 20px;
      display: inline-block;
      transition: transform 0.5s;
    }

    .roll-btn.rolling .roll-icon {
      animation: spin-icon 0.8s ease-out;
    }

    @keyframes spin-icon {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(720deg); }
    }

    /* 历史记录 */
    .history-section {
      width: 100%;
      max-width: 360px;
      margin-top: 32px;
    }

    .history-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--card);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .history-dice {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .history-mini-dice {
      width: 28px;
      height: 28px;
      background: var(--bg);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .history-sum {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .history-time {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
      text-align: right;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-secondary);
      font-size: 15px;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    /* 震动反馈（触感反馈提示） */
    @media (prefers-reduced-motion: reduce) {
      .dice.rolling,
      .roll-btn.rolling .roll-icon {
        animation: none;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>掷骰子</h1>
    <p>摇一摇，看看运气如何</p>
  </div>

  <div class="dice-area" id="diceArea">
    <!-- 骰子动态生成 -->
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-label">合计点数</div>
    <div class="result-total" id="resultTotal">—</div>
    <div class="result-detail" id="resultDetail"></div>
  </div>

  <div class="controls">
    <div class="count-selector" id="countSelector">
      <button class="count-btn active" data-count="1">1</button>
      <button class="count-btn" data-count="2">2</button>
      <button class="count-btn" data-count="3">3</button>
      <button class="count-btn" data-count="4">4</button>
      <button class="count-btn" data-count="5">5</button>
    </div>

    <button class="roll-btn" id="rollBtn" onclick="rollDice()">
      <span class="btn-text">
        <span class="roll-icon">🎲</span>
        掷骰子
      </span>
    </button>
  </div>

  <div class="history-section" id="historySection">
    <div class="history-title">历史记录</div>
    <div class="history-list" id="historyList">
      <div class="empty-state">
        <div class="empty-icon">🎲</div>
        <div>还没有投掷记录</div>
      </div>
    </div>
  </div>

  <script>
    let diceCount = 1;
    let isRolling = false;
    let history = [];

    // 骰子点阵配置 (行, 列)
    const dotConfig = {
      1: [[1,1]],
      2: [[1,3],[3,1]],
      3: [[1,3],[2,2],[3,1]],
      4: [[1,1],[1,3],[3,1],[3,3]],
      5: [[1,1],[1,3],[2,2],[3,1],[3,3]],
      6: [[1,1],[1,3],[2,1],[2,3],[3,1],[3,3]]
    };

    // 生成骰子面的HTML
    function makeFace(val, cssClass) {
      const dots = dotConfig[val];
      const maxRow = Math.max(...dots.map(d => d[0]));
      const maxCol = Math.max(...dots.map(d => d[1]));
      const rows = maxRow;
      const cols = maxCol === 1 ? 1 : maxCol;

      let dotsHTML = '';
      const grid = [];
      for (let r = 1; r <= rows; r++) {
        for (let c = 1; c <= cols; c++) {
          const has = dots.find(d => d[0] === r && d[1] === c);
          grid.push(`<div class="dot" style="${has ? '' : 'visibility:hidden'}"></div>`);
        }
      }

      const colStr = Array(cols).fill('1fr').join(' ');
      const rowStr = Array(rows).fill('1fr').join(' ');

      return `
        <div class="dice-face ${cssClass}">
          <div class="dots" style="grid-template-columns:${colStr};grid-template-rows:${rowStr};">
            ${grid.join('')}
          </div>
        </div>
      `;
    }

    // 渲染骰子DOM
    function renderDice(values) {
      const area = document.getElementById('diceArea');
      area.innerHTML = '';
      values.forEach(val => {
        // 六个面的值 (front, back, right, left, top, bottom)
        // 标准骰子：对面之和为7 (1对6, 2对5, 3对4)
        const wrapper = document.createElement('div');
        wrapper.className = 'dice-wrapper';
        wrapper.innerHTML = `
          <div class="dice">
            ${makeFace(val, 'face-front')}
            ${makeFace(7 - val, 'face-back')}
            ${makeFace(val === 6 ? 3 : val === 3 ? 6 : val === 5 ? 2 : val === 2 ? 5 : val === 4 ? 1 : 4, 'face-right')}
            ${makeFace(val === 6 ? 4 : val === 3 ? 1 : val === 5 ? 5 : val === 2 ? 2 : val === 4 ? 6 : 3, 'face-left')}
            ${makeFace(val === 6 ? 2 : val === 3 ? 5 : val === 5 ? 4 : val === 2 ? 3 : val === 4 ? 2 : 5, 'face-top')}
            ${makeFace(val === 6 ? 5 : val === 3 ? 2 : val === 5 ? 3 : val === 2 ? 4 : val === 4 ? 5 : 2, 'face-bottom')}
          </div>
        `;
        area.appendChild(wrapper);
      });
    }

    // 初始化骰子显示
    renderDice([1]);

    // 数量选择
    document.getElementById('countSelector').addEventListener('click', (e) => {
      const btn = e.target.closest('.count-btn');
      if (!btn || isRolling) return;
      document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      diceCount = parseInt(btn.dataset.count);
      renderDice(Array(diceCount).fill(1));
      document.getElementById('resultCard').classList.remove('visible');
    });

    // 触感反馈
    function haptic() {
      if ('vibrate' in navigator) {
        navigator.vibrate([10, 30, 10]);
      }
    }

    // 掷骰子
    function rollDice() {
      if (isRolling) return;
      isRolling = true;
      haptic();

      const btn = document.getElementById('rollBtn');
      btn.disabled = true;
      btn.classList.add('rolling');

      const resultCard = document.getElementById('resultCard');
      resultCard.classList.remove('visible');

      // 生成随机值
      const values = Array.from({ length: diceCount }, () => Math.ceil(Math.random() * 6));

      // 先渲染骰子（带正确的面值），然后触发动画
      renderDice(values);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.querySelectorAll('.dice').forEach(dice => {
            dice.classList.add('rolling');
          });
        });
      });

      // 动画结束后显示结果
      setTimeout(() => {
        const total = values.reduce((a, b) => a + b, 0);
        const detail = values.length > 1
          ? values.join(' + ') + ' = ' + total
          : '';

        document.getElementById('resultTotal').textContent = total;
        document.getElementById('resultDetail').textContent = detail;
        resultCard.classList.add('visible');

        // 添加历史记录
        addHistory(values, total);

        document.querySelectorAll('.dice').forEach(d => d.classList.remove('rolling'));
        btn.disabled = false;
        btn.classList.remove('rolling');
        isRolling = false;
      }, 900);
    }

    // 添加历史记录
    function addHistory(values, total) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      history.unshift({ values, total, time: timeStr });
      if (history.length > 10) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎲</div>
            <div>还没有投掷记录</div>
          </div>`;
        return;
      }

      list.innerHTML = history.map(item => `
        <div class="history-item">
          <div>
            <div class="history-dice">
              ${item.values.map(v => `<div class="history-mini-dice">${v}</div>`).join('')}
            </div>
            <div class="history-time">${item.time}</div>
          </div>
          <div class="history-sum">${item.total}</div>
        </div>
      `).join('');
    }

    // 摇一摇（设备运动）
    let lastShake = 0;
    function handleMotion(e) {
      const acc = e.accelerationIncludingGravity;
      if (!acc) return;
      const force = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
      const now = Date.now();
      if (force > 25 && now - lastShake > 1200) {
        lastShake = now;
        rollDice();
      }
    }

    // 请求运动权限（iOS 13+）
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
      document.getElementById('rollBtn').addEventListener('click', () => {
        DeviceMotionEvent.requestPermission().then(perm => {
          if (perm === 'granted') window.addEventListener('devicemotion', handleMotion);
        }).catch(() => {});
      }, { once: true });
    } else if (typeof DeviceMotionEvent !== 'undefined') {
      window.addEventListener('devicemotion', handleMotion);
    }

    // 键盘支持
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        rollDice();
      }
    });
  </script>
</body>
</html>
