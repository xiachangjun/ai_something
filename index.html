<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具目录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 10px;
      font-size: 1rem;
      color: #6e6e73;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .card .icon {
      font-size: 2rem;
      line-height: 1;
    }

    .card .name {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .card .desc {
      font-size: 0.85rem;
      color: #6e6e73;
      line-height: 1.5;
    }

    footer {
      margin-top: 60px;
      font-size: 0.8rem;
      color: #aeaeb2;
    }
  </style>
</head>
<body>

  <header>
    <h1>工具目录</h1>
    <p>所有小工具的快捷入口</p>
  </header>

  <div class="grid">
    <a class="card" href="sql工具.html">
      <div class="icon">🗄️</div>
      <div class="name">SQL 工具</div>
      <div class="desc">SQL 语句辅助编写与格式化</div>
    </a>

    <a class="card" href="https://pokemon.oldxia.xyz/">
      <div class="icon">⚡</div>
      <div class="name">宝可梦相克查询</div>
      <div class="desc">快速查询宝可梦属性克制关系</div>
    </a>

    <a class="card" href="骰子工具.html">
      <div class="icon">🎲</div>
      <div class="name">骰子工具</div>
      <div class="desc">多种骰子的在线投掷模拟</div>
    </a>
  </div>

  <footer>© 2026 工具集</footer>

</body>
</html>
